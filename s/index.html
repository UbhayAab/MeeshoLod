<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Meesho LOD Field — offline on-ground LODs: record the conversation, auto-bucket into insights." />
  <meta name="theme-color" content="#1E1B4B" />
  <meta name="robots" content="noindex, nofollow" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Meesho LOD · Field — Record &amp; Bucket</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{background:#F5F4FE;color:#1B1830;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}
    .boot-screen{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;padding:24px;text-align:center;
      background:radial-gradient(90% 60% at 80% -10%,rgba(109,94,246,.36),transparent 55%),radial-gradient(70% 50% at -10% 110%,rgba(14,124,134,.16),transparent 60%),linear-gradient(160deg,#332E78 0%,#1E1B4B 46%,#140F33 100%)}
    .boot-logo{width:52px;height:52px;border-radius:15px;display:grid;place-items:center;color:#fff;background:linear-gradient(180deg,#8577FF,#6D5EF6 58%,#5B4FE0);box-shadow:inset 0 1px 0 rgba(255,255,255,.14),0 8px 24px rgba(109,94,246,.5);animation:bootfloat 5s ease-in-out infinite}
    @keyframes bootfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    .boot-word{font-weight:800;font-size:clamp(20px,5.4vw,28px);line-height:1;letter-spacing:.26em;padding-left:.26em;text-transform:uppercase;color:#EEEBFF}
    .boot-tag{font-size:10px;font-weight:600;letter-spacing:.4em;padding-left:.4em;text-transform:uppercase;color:#9C93D6;margin-top:10px}
    .boot-wave{display:flex;align-items:center;gap:5px;height:34px}
    .boot-wave span{width:4px;border-radius:3px;background:#A99EFF;box-shadow:0 0 8px rgba(169,158,255,.6);animation:wave 1.1s ease-in-out infinite}
    .boot-wave span:nth-child(1){animation-delay:0s}.boot-wave span:nth-child(2){animation-delay:.12s}.boot-wave span:nth-child(3){animation-delay:.24s}.boot-wave span:nth-child(4){animation-delay:.36s}.boot-wave span:nth-child(5){animation-delay:.48s}.boot-wave span:nth-child(6){animation-delay:.6s}.boot-wave span:nth-child(7){animation-delay:.72s}
    @keyframes wave{0%,100%{height:8px;opacity:.5}50%{height:30px;opacity:1}}
    .boot-msg{color:#B9B1E6;font-size:13.5px;line-height:1.5;max-width:340px}
    .boot-link{color:#A99EFF;font-size:13px;text-decoration:underline;cursor:pointer;background:none;border:none;font-family:inherit;padding:8px 16px}
    .boot-error{color:#F0968B}
  </style>

  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Spline+Sans+Mono:ital,wght@0,400..700;1,400..700&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Spline+Sans+Mono:ital,wght@0,400..700;1,400..700&display=swap" /></noscript>

  <link rel="stylesheet" href="../css/variables.css?v=20260709a" />
  <link rel="stylesheet" href="../css/base.css?v=20260709a" />
  <link rel="stylesheet" href="../css/components.css?v=20260709a" />
  <link rel="stylesheet" href="../css/layout.css?v=20260709a" />
  <link rel="stylesheet" href="../css/lod.css?v=20260709a" />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236D5EF6' stroke-width='2'><path d='M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z'/><path d='M19 10v2a7 7 0 0 1-14 0v-2'/><line x1='12' y1='19' x2='12' y2='23'/></svg>" />
</head>
<body>
  <div id="app">
    <div class="boot-screen" id="boot-screen">
      <div class="boot-logo">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
      </div>
      <div>
        <div class="boot-word">Meesho LOD</div>
        <div class="boot-tag">Field · Record &amp; Bucket</div>
      </div>
      <div class="boot-wave"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
      <p class="boot-msg" id="boot-msg">Warming up the recorder…</p>
      <button class="boot-link" id="boot-retry" style="display:none" onclick="location.reload()">Retry</button>
    </div>
  </div>

  <script>window.__MLOD_VARIANT = 's';</script>
  <script type="module" src="../js/app.js?v=20260709a"></script>

  <script>
    (function(){
      var b=document.getElementById('boot-screen'),m=document.getElementById('boot-msg'),r=document.getElementById('boot-retry');
      setTimeout(function(){ if(!b||!b.isConnected)return; if(m)m.textContent='Still loading… your network may be slow.'; if(r)r.style.display='inline-block'; },5000);
      setTimeout(function(){ if(!b||!b.isConnected)return; if(m){m.classList.add('boot-error');m.innerHTML='Meesho LOD Field failed to start.<br>Please refresh the page.';} if(r)r.style.display='inline-block'; },15000);
    })();
  </script>
</body>
</html>
