<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Meesho LOD — Listen Or Die. Upload any list, call one by one, and let the AI co-pilot flash the right question at the right moment." />
  <meta name="theme-color" content="#570D48" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="format-detection" content="telephone=no" />

  <!-- Never serve a stale copy of this HTML (GH Pages caches HTML ~10 min) -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <meta property="og:title" content="Meesho LOD — Listen Or Die" />
  <meta property="og:description" content="Every function, always connected to users. Upload a list, set a goal, start calling." />
  <meta property="og:type" content="website" />

  <title>Meesho LOD — Listen Or Die</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Critical inline CSS for the boot screen — paints even if all
       external resources are blocked. Meesho purple night panel. -->
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{background:#FAF3F7;color:#241420;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}
    .boot-screen{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;padding:24px;text-align:center;
      background:radial-gradient(90% 60% at 80% -10%,rgba(244,51,151,.32),transparent 55%),radial-gradient(70% 50% at -10% 110%,rgba(232,155,69,.12),transparent 60%),linear-gradient(160deg,#4B0E40 0%,#2B0724 46%,#1D0419 100%)}
    .boot-logo{width:52px;height:52px;border-radius:15px;display:grid;place-items:center;color:#fff;background:linear-gradient(180deg,#FF54AC,#F43397 58%,#DE2A87);box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 8px 24px rgba(244,51,151,.5);animation:bootfloat 5s ease-in-out infinite}
    @keyframes bootfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    .boot-word{font-weight:800;font-size:clamp(20px,5.4vw,28px);line-height:1;letter-spacing:.26em;padding-left:.26em;text-transform:uppercase;color:#F6EAF1}
    .boot-tag{font-size:10px;font-weight:600;letter-spacing:.4em;padding-left:.4em;text-transform:uppercase;color:#9A7190;margin-top:10px}
    .boot-ecg{width:min(280px,70vw);height:36px;color:#FF7BC0;filter:drop-shadow(0 0 7px rgba(255,123,192,.6))}
    .boot-ecg path{stroke-dasharray:430;stroke-dashoffset:430;animation:bootecg 2.6s cubic-bezier(.22,.68,.16,1) infinite}
    @keyframes bootecg{0%{stroke-dashoffset:430;opacity:0}10%{opacity:1}60%{stroke-dashoffset:0;opacity:1}82%{opacity:0}100%{stroke-dashoffset:0;opacity:0}}
    .boot-msg{color:#CDA9C2;font-size:13.5px;line-height:1.5;max-width:340px}
    .boot-link{color:#FF9CCB;font-size:13px;text-decoration:underline;cursor:pointer;background:none;border:none;font-family:inherit;padding:8px 16px}
    .boot-link:hover{color:#FFC3DF}
    .boot-error{color:#F0968B}
  </style>

  <!-- Non-blocking font load -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Spline+Sans+Mono:ital,wght@0,400..700;1,400..700&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Spline+Sans+Mono:ital,wght@0,400..700;1,400..700&display=swap" /></noscript>

  <!-- App stylesheets — query string busts the cache when CSS changes -->
  <link rel="stylesheet" href="css/variables.css?v=20260708b" />
  <link rel="stylesheet" href="css/base.css?v=20260708b" />
  <link rel="stylesheet" href="css/components.css?v=20260708b" />
  <link rel="stylesheet" href="css/layout.css?v=20260708b" />
  <link rel="stylesheet" href="css/lod.css?v=20260708b" />

  <!-- Favicon: pink call target -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23F43397' stroke-width='2'><path d='M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.9.34 1.78.63 2.63a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.44-1.21a2 2 0 0 1 2.11-.45c.85.29 1.73.5 2.63.63A2 2 0 0 1 22 16.92z'/></svg>" />
</head>
<body>
  <!-- Boot screen — paints immediately, no external dependencies -->
  <div id="app">
    <div class="boot-screen" id="boot-screen">
      <div class="boot-logo">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15.05 5A5 5 0 0 1 19 8.95M15.05 1A9 9 0 0 1 23 8.94"/><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.9.34 1.78.63 2.63a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.44-1.21a2 2 0 0 1 2.11-.45c.85.29 1.73.5 2.63.63A2 2 0 0 1 22 16.92z"/></svg>
      </div>
      <div>
        <div class="boot-word">Meesho LOD</div>
        <div class="boot-tag">Listen Or Die</div>
      </div>
      <svg class="boot-ecg" viewBox="0 0 280 36" fill="none" preserveAspectRatio="none" aria-hidden="true">
        <path d="M0 18 H92 L104 18 112 6 122 30 130 18 H188 L196 18 202 11 208 25 214 18 H280" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <p class="boot-msg" id="boot-msg">Dialing in…</p>
      <button class="boot-link" id="boot-retry" style="display:none" onclick="location.reload()">Retry</button>
    </div>
  </div>

  <!-- App entry point -->
  <script type="module" src="js/app.js?v=20260708b"></script>

  <!-- Boot watchdog — no CDN deps in this app, so only two stages -->
  <script>
    (function(){
      var bootScreen = document.getElementById('boot-screen');
      var msg = document.getElementById('boot-msg');
      var retry = document.getElementById('boot-retry');
      setTimeout(function(){
        if (!bootScreen || !bootScreen.isConnected) return;
        if (msg) msg.textContent = 'Still loading… your network may be slow.';
        if (retry) retry.style.display = 'inline-block';
      }, 5000);
      setTimeout(function(){
        if (!bootScreen || !bootScreen.isConnected) return;
        if (msg) {
          msg.classList.add('boot-error');
          msg.innerHTML = 'Meesho LOD failed to start.<br>Please refresh the page.';
        }
        if (retry) retry.style.display = 'inline-block';
      }, 15000);
    })();
  </script>
</body>
</html>
